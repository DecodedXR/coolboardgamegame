; pygbag build scoping for the browser/WASM client (Tier 4).
; Without this, `pygbag main.py` bundles the WHOLE repo into the apk (server, tests,
; the spike dir with its own recursive build artifacts, caches, deploy config...).
;
; pygbag walks folders rooted at "/" and only rejects a subtree when the entry is
; LEADING-SLASH root-anchored: "/spike" matches "/spike" and every "/spike/..."
; descendant, whereas a bare "spike" would leak "spike/build". Its built-in defaults
; already drop /build, /.git, /.github, /venv, /dist; we add the project-specific
; rest. (__pycache__ needs no entry — it holds only .pyc, already in pygbag's
; SKIP_EXT; dotfiles like .gitignore are auto-skipped.)
;
; ignoreFiles matches by basename. Keep this in sync with tests/test_web_packaging.py.
[DEPENDENCIES]
ignoreDirs = ["/server", "/tests", "/spike", "/.pytest_cache", "/.claude", "/.idea", "/.vscode"]
ignoreFiles = ["Dockerfile", "render.yaml", "requirements.txt", "requirements-server.txt", "pytest.ini", "README.md"]
